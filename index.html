<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shreeya Mandal | Archive</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@200;300;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --accent-color: #70a1ff; /* Breezy Blue */
            --highlight: #ff7f50;    /* Coral */
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #2D3436;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Updated gradient for a fresh look */
            background: linear-gradient(135deg, #E0C3FC 0%, #8EC5FC 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        /* Ambient Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            animation: float 15s infinite alternate ease-in-out;
        }
        .orb-1 { width: 40vw; height: 40vw; background: rgba(224, 195, 252, 0.5); top: -10%; left: -10%; }
        .orb-2 { width: 30vw; height: 30vw; background: rgba(142, 197, 252, 0.5); bottom: -10%; right: -5%; }

        @keyframes float {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(40px, 40px) rotate(10deg); }
        }

        .main-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1200px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            display: grid;
            grid-template-columns: 400px 1fr;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            opacity: 0;
            transform: scale(0.98);
        }

        .sidebar {
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.1);
            border-right: 1px solid var(--glass-border);
        }

        .version-tag {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: var(--highlight);
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 0.9;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #333, var(--highlight));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .content-area {
            padding: 80px;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .content-area::-webkit-scrollbar { display: none; }

        .section-label {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.6rem;
            color: var(--highlight);
            margin-bottom: 40px;
            display: block;
        }

        .quote-wall {
            font-size: 1.4rem;
            line-height: 1.8;
            font-weight: 300;
            text-align: justify;
            opacity: 0.8;
        }

        @media (max-width: 950px) {
            body { padding: 15px; }
            .main-card {
                grid-template-columns: 1fr;
                height: 92vh;
                border-radius: 30px;
            }
            .sidebar {
                padding: 40px 30px;
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
                height: auto;
                gap: 30px;
            }
            .hero h1 { font-size: 2.2rem; }
            .content-area { padding: 40px 30px; }
            .quote-wall { font-size: 1.1rem; line-height: 1.6; }
        }

        .status-footer {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .dot {
            width: 10px; height: 10px;
            background: var(--highlight);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--highlight);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <main class="main-card" id="siteContainer">
        <aside class="sidebar">
            <div class="version-tag">PROFILE V.10</div>
            
            <div class="hero">
                <h1>SHREEYA MANDAL</h1>
                <p style="margin-top: 15px; font-weight: 300; opacity: 0.6; font-size: 0.8rem; letter-spacing: 1px;">DIGITAL IDENTITY ARCHIVE</p>
            </div>

            <div class="status-footer">
                <div class="dot"></div> ONLINE
            </div>
        </aside>

        <section class="content-area">
            <span class="section-label">// IDENTITY_CORE</span>
            <div class="quote-wall" id="wall">
                </div>
        </section>
    </main>

    <script>
        const wall = document.getElementById('wall');
        // Your specific phrase
        const textToRepeat = "I'm short, sweet, smart and very nice to people. ";
        
        // Repeating the text 60 times for a clean wall effect
        // Then adding the single note at the end
        wall.innerHTML = textToRepeat.repeat(1) + 
        "<br><br><span style='color:var(--highlight); font-weight:700; text-transform: uppercase; letter-spacing: 2px;'>— This is Shreeya Mandal a Big Helper.</span>";

        // Smooth GSAP Entrance
        window.addEventListener('load', () => {
            gsap.to("#siteContainer", {
                duration: 1.2,
                opacity: 1,
                scale: 1,
                ease: "power4.out"
            });
        });
    </script>
</body>
</html>
